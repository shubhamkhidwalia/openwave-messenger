<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OpenWave">
  <meta name="theme-color" content="#F59E0B">
  <title>OpenWave</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<!-- Auth -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🌊</div>
    <h1 class="auth-title">OpenWave</h1>
    <p class="auth-sub">Fast. Open. Yours.</p>
    <div id="invite-banner" class="invite-banner"></div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign In</button>
      <button class="auth-tab" data-tab="register">Register</button>
    </div>
    <form id="login-form" class="auth-form active">
      <div class="field-group"><label>Username</label><input type="text" id="login-username" placeholder="your_username" autocomplete="username" autocapitalize="none"></div>
      <div class="field-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="auth-error" id="login-error"></div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>
    <form id="register-form" class="auth-form">
      <div class="field-group"><label>Display Name</label><input type="text" id="reg-name" placeholder="Your Name" autocomplete="name"></div>
      <div class="field-group"><label>Username</label><input type="text" id="reg-username" placeholder="username" autocomplete="off" autocapitalize="none"></div>
      <div class="field-group"><label>Phone <span class="optional">(optional)</span></label><input type="tel" id="reg-phone" placeholder="+91 98765 43210"></div>
      <div class="field-group"><label>Password</label><input type="password" id="reg-password" placeholder="min 6 characters" autocomplete="new-password"></div>
      <div class="field-group"><label>Invite Code <span class="optional">*required*</span></label><input type="text" id="reg-invite" placeholder="Paste invite code" autocomplete="off" autocapitalize="none"></div>
      <div class="auth-error" id="reg-error"></div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
  </div>
</div>

<!-- App -->
<div id="app" class="app hidden">

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <button class="icon-btn" id="menu-btn">☰</button>
      <span class="sidebar-title">OpenWave</span>
      <div class="sidebar-actions">
        <button class="icon-btn" id="starred-btn" title="Starred messages">⭐</button>
        <button class="icon-btn" id="compose-btn" title="New chat">✏</button>
        <button class="icon-btn" id="theme-btn">◐</button>
      </div>
    </div>
    <div class="search-bar">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search chats…">
      <button class="clear-search hidden" id="clear-search">✕</button>
    </div>
    <div id="chat-list" class="chat-list"></div>
  </aside>

  <div id="menu-overlay" class="menu-overlay" onclick="App.closeMenu()"></div>
  <div id="menu-drawer" class="menu-drawer">
    <div class="menu-profile">
      <div class="menu-avatar" id="menu-avatar"></div>
      <div>
        <div class="menu-display-name" id="menu-display-name"></div>
        <div class="menu-username" id="menu-username"></div>
      </div>
    </div>
    <div class="menu-items">
      <button class="menu-item" onclick="App.showContacts()">👥 Contacts</button>
      <button class="menu-item" onclick="App.showNewGroup()">👫 New Group</button>
      <button class="menu-item" onclick="App.showStarred()">⭐ Starred Messages</button>
      <button class="menu-item" onclick="App.showSettings()">⚙ Settings</button>
      <div class="menu-divider"></div>
      <button class="menu-item danger" onclick="App.logout()">↩ Sign Out</button>
    </div>
  </div>

  <main id="chat-area" class="chat-area">
    <div id="splash" class="splash">
      <div class="splash-icon">🌊</div>
      <h2>OpenWave</h2>
      <p>Select a conversation or start a new one</p>
    </div>

    <div id="chat-view" class="chat-view hidden">
      <div class="chat-header">
        <button class="back-btn" onclick="App.closeChat()">‹</button>
        <div class="chat-header-avatar" id="chat-header-avatar" onclick="App.showChatInfo()"></div>
        <div class="chat-header-info" onclick="App.showChatInfo()">
          <div class="chat-header-name" id="chat-header-name"></div>
          <div class="chat-header-status" id="chat-header-status"></div>
        </div>
        <div class="chat-header-actions">
          <button class="icon-btn" id="chat-search-btn" title="Search">⌕</button>
          <button class="icon-btn" id="chat-menu-btn">⋮</button>
        </div>
      </div>

      <!-- In-chat search -->
      <div id="chat-search-bar" class="chat-search-bar">
        <div class="chat-search-inner">
          <input type="text" id="chat-search-input" placeholder="Search in conversation…" oninput="App.searchInChat(this.value)">
          <span class="search-count" id="search-count"></span>
          <button class="icon-btn" onclick="App.closeChatSearch()">✕</button>
        </div>
      </div>

      <div id="chat-dropdown" class="dropdown hidden">
        <div class="dropdown-item" onclick="App.clearChatHistory()">🗑 Clear history</div>
        <div class="dropdown-item danger" onclick="App.deleteChat()">✕ Delete chat</div>
      </div>

      <div id="messages-list" class="messages-list"></div>

      <div id="typing-banner" class="typing-banner hidden">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span id="typing-text"></span>
      </div>

      <div id="reply-preview" class="reply-preview hidden">
        <div class="reply-bar"></div>
        <div class="reply-content">
          <div class="reply-to-name" id="reply-to-name"></div>
          <div class="reply-to-text" id="reply-to-text"></div>
        </div>
        <button class="icon-btn" onclick="App.cancelReply()">✕</button>
      </div>

      <div class="input-area">
        <button class="attach-btn" id="attach-btn">📎</button>
        <input type="file" id="file-input" hidden accept="image/*,video/*,audio/*,.pdf,.zip,.txt">
        <div class="input-wrap">
          <textarea id="msg-input" placeholder="Message…" rows="1"></textarea>
          <button class="emoji-btn" id="emoji-btn">😊</button>
        </div>
        <span class="record-timer" id="record-timer">0:00</span>
        <button class="voice-btn" id="voice-btn" title="Voice message">🎤</button>
        <button class="send-btn idle" id="send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- Reaction picker -->
<div id="reaction-picker" class="reaction-picker">
  <span class="reaction-emoji" onclick="App.addReaction('❤️')">❤️</span>
  <span class="reaction-emoji" onclick="App.addReaction('👍')">👍</span>
  <span class="reaction-emoji" onclick="App.addReaction('😂')">😂</span>
  <span class="reaction-emoji" onclick="App.addReaction('😮')">😮</span>
  <span class="reaction-emoji" onclick="App.addReaction('😢')">😢</span>
  <span class="reaction-emoji" onclick="App.addReaction('🙏')">🙏</span>
</div>

<!-- Modals -->
<div id="modal-new-chat" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header"><h3>New Message</h3><button class="icon-btn" onclick="App.closeModal('modal-new-chat')">✕</button></div>
    <div class="modal-search"><input type="text" id="user-search-input" placeholder="Search by username…" oninput="App.searchUsers(this.value)" autocapitalize="none"></div>
    <div id="user-search-results" class="user-list"></div>
  </div>
</div>

<div id="modal-new-group" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header"><h3>New Group</h3><button class="icon-btn" onclick="App.closeModal('modal-new-group')">✕</button></div>
    <div class="modal-search"><input type="text" id="group-name-input" placeholder="Group name…"></div>
    <div class="modal-search" style="border-top:none"><input type="text" id="group-user-search" placeholder="Add members…" oninput="App.searchGroupUsers(this.value)" autocapitalize="none"></div>
    <div id="selected-members" class="selected-members"></div>
    <div id="group-user-results" class="user-list"></div>
    <div class="modal-footer"><button class="btn-primary" onclick="App.createGroup()">Create Group</button></div>
  </div>
</div>

<div id="modal-chat-info" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header"><h3 id="info-title">Profile</h3><button class="icon-btn" onclick="App.closeModal('modal-chat-info')">✕</button></div>
    <div class="profile-header">
      <div class="profile-avatar" id="info-avatar"></div>
      <div class="profile-name" id="info-name"></div>
      <div class="profile-sub" id="info-sub"></div>
    </div>
    <div class="profile-section" id="info-bio-section"><div class="profile-label">Bio</div><div class="profile-value" id="info-bio"></div></div>
    <div class="profile-actions" id="info-actions"></div>
  </div>
</div>

<div id="modal-settings" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header"><h3>Settings</h3><button class="icon-btn" onclick="App.closeModal('modal-settings')">✕</button></div>
    <div class="settings-body">
      <div class="settings-avatar-wrap">
        <div class="settings-avatar" id="settings-avatar" onclick="document.getElementById('avatar-file').click()"></div>
        <div class="settings-avatar-hint">Tap to change photo</div>
        <input type="file" id="avatar-file" hidden accept="image/*" onchange="App.uploadAvatar(this)">
      </div>
      <div class="field-group"><label>Display Name</label><input type="text" id="settings-name"></div>
      <div class="field-group"><label>Bio</label><textarea id="settings-bio" rows="3" placeholder="Something about you…"></textarea></div>
      <div class="settings-info" id="settings-username-display"></div>
      <button class="btn-primary" onclick="App.saveSettings()">Save Changes</button>
    </div>
  </div>
</div>

<div id="modal-starred" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header"><h3>⭐ Starred Messages</h3><button class="icon-btn" onclick="App.closeModal('modal-starred')">✕</button></div>
    <div id="starred-list" class="starred-list"></div>
  </div>
</div>

<!-- Forward modal -->
<div id="modal-forward" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header"><h3>Forward to…</h3><button class="icon-btn" onclick="App.closeModal('modal-forward')">✕</button></div>
    <div id="forward-chat-list" class="user-list"></div>
  </div>
</div>

<div id="install-banner" class="install-banner">
  <span>📲 Add OpenWave to your home screen</span>
  <button id="install-btn">Install</button>
  <button class="dismiss" onclick="document.getElementById('install-banner').classList.remove('show')">✕</button>
</div>

<div id="toast" class="toast hidden"></div>

<script src="/js/api.js"></script>
<script src="/js/ws.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/app.js"></script>
<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  setTimeout(() => document.getElementById('install-banner').classList.add('show'), 4000);
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
