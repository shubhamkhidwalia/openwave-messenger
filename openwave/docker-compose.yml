version: '3.9'

services:
  openwave:
    build: .
    container_name: openwave
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - NODE_ENV=production
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-*}
    volumes:
      - openwave_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  openwave_data:
