name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: zip -r openwave-${{ github.ref_name }}.zip openwave --exclude "openwave/backend/node_modules/*" "openwave/backend/data/*"
      - uses: softprops/action-gh-release@v2
        with:
          files: openwave-${{ github.ref_name }}.zip
